<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
   
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <title>React App</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <body class="m-0 text-[1.1rem] font-sans font-smoothing">
        <!-- Main Container -->
        <div class="relative bg-[#0d1116] main-container">
          <!-- Navigation bar -->
          <nav class="flex justify-between bg-[#0d1116] navigation-bar">
            <button class="text-[1.1rem] font-lato normal-case px-3 py-2">Button</button>
            <svg class="cursor-pointer"></svg>
          </nav>
      
          <!-- Responsive Navigation Bar -->
          <div class="navigation-bar-responsive">
            <span class="text-[#0d1116] font-lato"></span>
            <p class="text-[#0d1116] font-lato"></p>
          </div>
      
          <!-- Container -->
          <div class="mt-16 w-full flex flex-col items-center justify-center container"></div>
      
          <!-- Header Image -->
          <div class="w-full h-[450px] header-image">
            <img class="w-full h-[450px] object-cover" src="image-url" alt="header image">
          </div>
      
          <!-- Mobile Menu Top -->
          <div class="flex justify-center items-center gap-1 font-bold mobile-menu-top"></div>
      
          <!-- Items Container -->
          <div class="px-10 py-5 text-left flex flex-col justify-center items-container"></div>
      
          <!-- Light Mode Styling -->
          <div class="light-mode bg-gray-100">
            <nav class="bg-gray-100 navigation-bar"></nav>
            <p class="text-[#0d1116] font-lato"></p>
            <a class="text-[#0d1116] font-lato"></a>
            <h1 class="text-[#0d1116] font-lato"></h1>
            <h2 class="text-[#0d1116] font-lato"></h2>
            <button class="text-[#0d1116] font-lato"></button>
            <a class="hover:text-[#5000ca] transition-colors ease-in-out duration-150"></a>
            <svg class="text-[#0d1116]"></svg>
            <div class="about-section bg-[url('/assets/images/bg-light.png')]"></div>
            <div class="skills-container">
              <svg class="text-[#0d1116]"></svg>
            </div>
      

            <div class="chip bg-black/20 shadow-lg"></div>
            <div class="vertical-timeline before:bg-black/20"></div>
            <div class="vertical-timeline-element-content shadow-lg"></div>
            <div class="vertical-timeline-element-date text-gray-500"></div>
            <div class="vertical-timeline-element-content-arrow border-r-[7px] border-r-black/20"></div>
            <div class="flex-chips">
              <div class="chip-title text-[#0d1116]"></div>
            </div>
          </div>
      
          <!-- Responsive Items Container for smaller screens -->
          <div class="sm:px-5 items-container"></div>
        </div>
      </body>
      
    </div>
   
  </body>
</html>
